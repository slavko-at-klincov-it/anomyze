name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Cache HuggingFace models
        uses: actions/cache@v4
        with:
          path: ~/.cache/huggingface
          key: hf-models-${{ runner.os }}-${{ hashFiles('anomyze/config/settings.py') }}
          restore-keys: hf-models-${{ runner.os }}-

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Lint
        run: ruff check anomyze/

      - name: Type check
        run: mypy anomyze/ --ignore-missing-imports

      - name: Test
        run: pytest tests/ -v --cov=anomyze --cov-report=term-missing

  docker:
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t anomyze:latest .
