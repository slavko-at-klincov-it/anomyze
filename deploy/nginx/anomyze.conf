# /etc/nginx/sites-available/anomyze.conf
#
# Reverse-proxy vor Anomyze. Terminiert TLS und reicht an den
# oauth2-proxy (OIDC) weiter, der den Request an den FastAPI-Upstream
# leitet. Der Container hört auf 127.0.0.1:8000, niemals direkt
# exponiert.
#
# Platzhalter in {{…}} durch die Betreiber füllen.

upstream anomyze_auth {
    # oauth2-proxy (siehe deploy/oauth2-proxy/config.cfg)
    server 127.0.0.1:4180 fail_timeout=30s max_fails=3;
    keepalive 8;
}

server {
    listen 80;
    server_name {{anomyze.behoerde.gv.at}};

    # alle HTTP-Requests auf HTTPS zwingen
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name {{anomyze.behoerde.gv.at}};

    # Behörden-CA bzw. interne PKI.
    ssl_certificate     /etc/ssl/private/{{anomyze.behoerde.gv.at}}.crt;
    ssl_certificate_key /etc/ssl/private/{{anomyze.behoerde.gv.at}}.key;

    ssl_protocols TLSv1.3 TLSv1.2;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;

    # Request-Body-Cap — doppelt absichern (Anomyze selbst filtert
    # ebenfalls auf ANOMYZE_MAX_REQUEST_BODY_BYTES).
    client_max_body_size 1m;
    client_body_timeout 60s;

    # Proxy-Timeouts grosszügig: erster Modell-Lauf kann Sekunden
    # dauern, spätere Requests sind schneller.
    proxy_read_timeout 120s;
    proxy_send_timeout 60s;
    proxy_connect_timeout 10s;

    # Security-Header ergänzend zu dem, was `secure` im Container setzt.
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "no-referrer" always;
    add_header Content-Security-Policy "default-src 'none'; frame-ancestors 'none'" always;

    # Zugriffs-Logging — PII darf hier NICHT landen. Request-Body wird
    # nicht geloggt; nur Methode, Pfad, Status, Dauer.
    access_log /var/log/nginx/anomyze.access.log combined buffer=32k flush=10s;
    error_log  /var/log/nginx/anomyze.error.log warn;

    location / {
        proxy_pass http://anomyze_auth;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
    }

    # /metrics nicht hinter OIDC sperren — Prometheus-Scraper nutzt
    # stattdessen eine IP-Whitelist. /metrics wird direkt an den
    # Anomyze-Upstream geleitet.
    location = /metrics {
        allow {{10.0.0.0/8}};  # Monitoring-Netz
        deny all;
        proxy_pass http://127.0.0.1:8000/metrics;
    }
}
