# oauth2-proxy configuration for Anomyze
#
# Läuft zwischen nginx und dem Anomyze-Container. Validiert die
# Sitzung gegen den behördlichen OIDC-Provider (Portalverbund,
# Keycloak oder A-SIT-Broker) und leitet erst dann an den Upstream
# weiter. Der Container selbst vertraut dem Upstream-Netzwerk.
#
# Installation: oauth2-proxy binary nach /usr/local/bin kopieren
# und als systemd-Unit starten.
#
# Platzhalter in {{…}} ersetzen.

# ---- Binding ----
http_address = "127.0.0.1:4180"
reverse_proxy = true
trusted_ips = ["127.0.0.1/32"]  # nginx läuft auf demselben Host

# ---- Upstream ----
upstreams = [
    "http://127.0.0.1:8000"
]
pass_host_header = true
pass_access_token = false   # Upstream braucht das Token nicht

# ---- OIDC Provider ----
provider = "oidc"
oidc_issuer_url = "{{https://oidc.behoerde.gv.at/realms/anomyze}}"
client_id = "{{anomyze-prod}}"
client_secret = "{{OIDC_CLIENT_SECRET}}"  # via systemd EnvironmentFile
redirect_url = "{{https://anomyze.behoerde.gv.at/oauth2/callback}}"

# ---- Scopes + E-Mail-Domains ----
scope = "openid profile email"
email_domains = ["{{*.gv.at}}"]

# ---- Cookie ----
cookie_name = "_anomyze_oauth2"
cookie_secret = "{{32-byte-base64-secret}}"  # via EnvironmentFile
cookie_expire = "8h"
cookie_refresh = "1h"
cookie_secure = true
cookie_httponly = true
cookie_samesite = "lax"

# ---- Sessions ----
session_store_type = "cookie"

# ---- Logging ----
# PII-freundlich: nur User-ID + Pfad, nie Request-Body.
standard_logging = true
auth_logging = true
request_logging = true
silence_ping_logging = true

# ---- Skip auth für public-metric endpoint ----
# /metrics wird über nginx + IP-Whitelist abgesichert, nicht OIDC.
skip_auth_routes = [
    "GET=^/metrics$"
]
