services:
  anomyze:
    build: .
    ports:
      - "8000:8000"
    volumes:
      - model-cache:/home/anomyze/.cache/huggingface
    environment:
      - ANOMYZE_DEVICE=cpu
      - ANOMYZE_API_HOST=0.0.0.0
      - ANOMYZE_API_PORT=8000
      - ANOMYZE_DEFAULT_CHANNEL=govgpt
      - ANOMYZE_AUDIT_ENABLED=true
    read_only: true
    tmpfs:
      - /tmp:size=256M
      - /home/anomyze/.cache/huggingface/tmp:size=512M
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    deploy:
      resources:
        limits:
          memory: 10G
          cpus: "4.0"
        reservations:
          memory: 4G
    restart: unless-stopped

volumes:
  model-cache:
    driver: local
